<script>
    class OpenAccessQuiz extends HTMLElement {
  constructor() {
    super();
    const template = document.getElementById("open-access-quiz-template");
    if (!template) {
      console.error("❌ Template not found.");
      return;
    }
    const shadow = this.attachShadow({ mode: "open" });
    shadow.appendChild(template.content.cloneNode(true));
  }

  connectedCallback() {
    const root = this.shadowRoot;
    root.querySelectorAll("button[data-q]").forEach(btn => {
      btn.addEventListener("click", e => {
        const q = e.target.dataset.q;
        const a = e.target.dataset.a;
        this.showAnswer(q, a);
      });
    });
  }

  showAnswer(questionId, answer) {
    const root = this.shadowRoot;
    const qEl = root.getElementById(questionId);
    if (qEl) qEl.hidden = true;
    root.querySelectorAll(`[id^="a${questionId.slice(1)}-"]`).forEach(el => el.hidden = true);
    const target = root.getElementById(`a${questionId.slice(1)}-${answer}`);
    if (target) {
      target.hidden = false;
      const nextQ = target.querySelector(".question");
      if (nextQ) nextQ.hidden = false;
    }
  }
}

customElements.define("open-access-quiz", OpenAccessQuiz);

</script>
